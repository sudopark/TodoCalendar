name: Test

on:
  pull_request:
    branches: ['**']

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      schemes: ${{ steps.map.outputs.schemes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$FILES"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Map changes to test schemes
        id: map
        run: |
          FILES="${{ steps.changed.outputs.files }}"

          ALL_SCHEMES="Domain Repository CalendarScenes EventDetailScene EventListScenes SettingScene MemberScenes AIAgentScene TodoCalendarApp TodoCalendarAppWidget"
          ALL_PRESENTATION="CalendarScenes EventDetailScene EventListScenes SettingScene MemberScenes AIAgentScene"

          schemes=()

          # === 프로젝트 구조/의존성 변경 → 전체 테스트 ===
          if echo "$FILES" | grep -qE "^(Package\.swift|Package\.resolved|Tuist/|Tuist\.swift|mise\.toml)"; then
            echo "schemes= ${ALL_SCHEMES} " >> "$GITHUB_OUTPUT"
            echo "Detected: project structure changed → run all"
            exit 0
          fi

          # === Supports 레이어 ===
          # Common3rdParty: 모든 모듈의 기반
          if echo "$FILES" | grep -q "^Supports/Common3rdParty/"; then
            schemes+=($ALL_SCHEMES)
          fi

          # Extensions/Sources: Domain 이상 모든 모듈이 의존
          if echo "$FILES" | grep -q "^Supports/Extensions/Sources/"; then
            schemes+=($ALL_SCHEMES)
          fi

          # UnitTestHelpKit: 테스트 인프라 → 모든 테스트 스킴
          if echo "$FILES" | grep -q "^Supports/UnitTestHelpKit/Sources/"; then
            schemes+=($ALL_SCHEMES)
          fi

          # TestDoubles: Domain/Scenes 스텁 → Repository + Presentation + App 테스트
          # (Domain 테스트는 TestDoubles를 사용하지 않음)
          if echo "$FILES" | grep -q "^Supports/TestDoubles/Sources/"; then
            schemes+=("Repository" $ALL_PRESENTATION "TodoCalendarApp" "TodoCalendarAppWidget")
          fi

          # === Domain 레이어 ===
          # Domain/Sources: Repository + 모든 Presentation + App + Widget이 의존
          if echo "$FILES" | grep -q "^Domain/Sources/"; then
            schemes+=($ALL_SCHEMES)
          fi
          if echo "$FILES" | grep -q "^Domain/Tests/"; then
            schemes+=("Domain")
          fi

          # === Repository 레이어 ===
          if echo "$FILES" | grep -q "^Repository/Sources/"; then
            schemes+=("Repository" "TodoCalendarApp" "TodoCalendarAppWidget")
          fi
          if echo "$FILES" | grep -q "^Repository/Tests/"; then
            schemes+=("Repository")
          fi

          # === Presentation 공통 ===
          # CommonPresentation: 모든 Presentation Scene + App + Widget이 의존
          if echo "$FILES" | grep -q "^Presentations/CommonPresentation/"; then
            schemes+=($ALL_PRESENTATION "TodoCalendarApp" "TodoCalendarAppWidget")
          fi
          # Scenes: 모든 Presentation Scene + App이 의존 (Widget은 미의존)
          if echo "$FILES" | grep -q "^Presentations/Scenes/"; then
            schemes+=($ALL_PRESENTATION "TodoCalendarApp")
          fi

          # === Presentation 개별 Scene ===
          if echo "$FILES" | grep -q "^Presentations/CalendarScenes/"; then
            schemes+=("CalendarScenes" "TodoCalendarApp" "TodoCalendarAppWidget")
          fi
          if echo "$FILES" | grep -q "^Presentations/EventDetailScene/"; then
            schemes+=("EventDetailScene" "TodoCalendarApp")
          fi
          if echo "$FILES" | grep -q "^Presentations/EventListScenes/"; then
            schemes+=("EventListScenes" "TodoCalendarApp")
          fi
          if echo "$FILES" | grep -q "^Presentations/SettingScene/"; then
            schemes+=("SettingScene" "TodoCalendarApp")
          fi
          if echo "$FILES" | grep -q "^Presentations/MemberScenes/"; then
            schemes+=("MemberScenes" "TodoCalendarApp")
          fi
          if echo "$FILES" | grep -q "^Presentations/AIAgentScene/"; then
            schemes+=("AIAgentScene")
          fi

          # === App 타겟 ===
          if echo "$FILES" | grep -qE "^TodoCalendarApp/(Sources|Tests)/"; then
            schemes+=("TodoCalendarApp")
          fi
          if echo "$FILES" | grep -q "^TodoCalendarApp/AppExtensions/Widget/"; then
            schemes+=("TodoCalendarAppWidget")
          fi

          # .github/, scripts/, docs/ 등 → 코드 빌드에 영향 없으므로 테스트 불필요

          # 중복 제거 + 양쪽 공백 padding (contains 오탐 방지)
          if [ ${#schemes[@]} -eq 0 ]; then
            echo "schemes=" >> "$GITHUB_OUTPUT"
            echo "Detected: no test-relevant changes"
          else
            unique=$(printf '%s\n' "${schemes[@]}" | sort -u | tr '\n' ' ' | sed 's/ $//')
            echo "schemes= ${unique} " >> "$GITHUB_OUTPUT"
            echo "Detected schemes: ${unique}"
          fi

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.schemes != ''
    runs-on: Maggie-m1
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      DESTINATION: 'platform=iOS Simulator,name=iPhone 16,OS=18.1'
    steps:
      - uses: actions/checkout@v5

      - name: Setup dummy config
        run: |
          cd install && bash install.sh

      - name: Install toolchain (tuist via mise)
        run: |
          mise install
          echo "$(mise where tuist)" >> "$GITHUB_PATH"

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            Tuist/.build
            ~/Library/Caches/tuist
          key: spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-

      - name: Install dependencies
        run: tuist install

      - name: Generate project
        run: tuist generate --no-open

      - name: Reset DerivedData
        run: |
          set -euo pipefail
          rm -rf ./DerivedData

      - name: Test Domain
        if: contains(needs.detect-changes.outputs.schemes, ' Domain ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme Domain \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test Repository
        if: contains(needs.detect-changes.outputs.schemes, ' Repository ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme Repository \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test CalendarScenes
        if: contains(needs.detect-changes.outputs.schemes, ' CalendarScenes ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme CalendarScenes \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test EventDetailScene
        if: contains(needs.detect-changes.outputs.schemes, ' EventDetailScene ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme EventDetailScene \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test EventListScenes
        if: contains(needs.detect-changes.outputs.schemes, ' EventListScenes ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme EventListScenes \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test SettingScene
        if: contains(needs.detect-changes.outputs.schemes, ' SettingScene ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme SettingScene \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test MemberScenes
        if: contains(needs.detect-changes.outputs.schemes, ' MemberScenes ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme MemberScenes \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test AIAgentScene
        if: contains(needs.detect-changes.outputs.schemes, ' AIAgentScene ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme AIAgentScene \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test TodoCalendarApp
        if: contains(needs.detect-changes.outputs.schemes, ' TodoCalendarApp ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme TodoCalendarApp \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty

      - name: Test TodoCalendarAppWidget
        if: contains(needs.detect-changes.outputs.schemes, ' TodoCalendarAppWidget ')
        run: |
          set -euo pipefail
          xcodebuild test \
            -workspace TodoCalendar.xcworkspace \
            -scheme TodoCalendarAppWidget \
            -derivedDataPath ./DerivedData \
            -destination "$DESTINATION" \
            -testLanguage en -testRegion en_US \
            | xcpretty
